app = "finally"

[build]
  image = "docker.io/library/finally:latest"

[env]
  DATABASE_URL = "sqlite:///./db/finally.db"
  OPENROUTER_API_KEY = ""
  MASSIVE_API_KEY = ""
  LLM_MOCK = "false"

[[services]]
  internal_port = 8000
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls"]
    port = 443

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20
